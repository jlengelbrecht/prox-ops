---
# ExternalSecret for Newtarr Flask SECRET_KEY
# Pulls from 1Password Automation vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newtarr-secret
  namespace: media
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: newtarr-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  refreshInterval: 1h
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: newtarr
        property: secret-key
