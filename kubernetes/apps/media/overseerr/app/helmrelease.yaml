---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: overseerr
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
      # renovate: datasource=helm registryUrl=https://bjw-s.github.io/helm-charts
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: media
  interval: 1h
  values:
    controllers:
      overseerr:
        strategy: Recreate
        containers:
          app:
            image:
              # Migrated from archived sctx/overseerr to its active successor Seerr
              # (seerr-team/seerr, merges Overseerr + Jellyseerr). Drop-in: the existing
              # /app/config PVC auto-migrates the SQLite DB on first boot. Kept UID 568
              # (PVC is already 568-owned) and the same PVC/service/host to preserve data.
              repository: ghcr.io/seerr-team/seerr
              # renovate: datasource=docker depName=ghcr.io/seerr-team/seerr
              tag: v3.3.0
            env:
              TZ: America/New_York
              LOG_LEVEL: info
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    # Lightweight, unauthenticated public endpoint (Seerr's
                    # recommended healthcheck). Avoids /api/v1/status, which makes
                    # GitHub update-check calls on every probe and can rate-limit.
                    path: /api/v1/settings/public
                    port: &port 5055
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    # Lightweight, unauthenticated public endpoint (Seerr's
                    # recommended healthcheck). Avoids /api/v1/status, which makes
                    # GitHub update-check calls on every probe and can rate-limit.
                    path: /api/v1/settings/public
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      annotations:
        security.homelab/network: "External - media requests"

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/config

    service:
      app:
        controller: overseerr
        type: ClusterIP
        ports:
          http:
            port: *port
            protocol: TCP
