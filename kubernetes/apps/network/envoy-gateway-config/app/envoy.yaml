---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 4
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: gateway.envoyproxy.io/owning-gateway-namespace
                        operator: In
                        values:
                          - network
                  topologyKey: kubernetes.io/hostname
        container:
          resources:
            requests:
              cpu: 100m
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Cluster
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Gzip
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: network
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-external
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      # PUBLIC DNS: external.${SECRET_DOMAIN} is managed by the DNSEndpoint in
      # network/cloudflare-tunnel (CNAME to the Cloudflare tunnel). cloudflare-dns
      # (the public/Cloudflare external-dns instance) does NOT have "service" in
      # its `sources` list (only crd + gateway-httproute - see
      # network/cloudflare-dns/app/helmrelease.yaml), so it never watches this
      # Service and the hostname annotation below cannot conflict with or
      # override the public tunnel CNAME.
      #
      # LAN DNS (this annotation): unifi-dns DOES have "service" as a source
      # and has no gateway-name scoping on it, so it publishes a LAN-only
      # UniFi Local DNS Record: external.${SECRET_DOMAIN} -> A 10.20.67.23
      # (this Service's real address). This closes a real bug: every
      # HTTPRoute parented to this Gateway inherits the
      # `external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}`
      # annotation above as its CNAME target. On the LAN/UDM resolver,
      # external.${SECRET_DOMAIN} was previously out-of-zone (Cloudflare-only)
      # with no local A record, so every external-only app (grafana,
      # voice-bridge, flux-webhook, ...) and the "losing" side of every
      # dual-route app's non-deterministic unifi-dns pick resolved to a
      # dangling CNAME on the LAN - glibc tolerates this (follow-up query
      # reaches the real public Cloudflare IP and round-trips back through
      # the tunnel), Android's resolver rejects it outright ("Address Not
      # Found"). Giving external.${SECRET_DOMAIN} its own complete, LAN-local,
      # LAN-reachable A record fixes every affected hostname in one place,
      # and keeps dual-route apps working (and now flap-immune) regardless
      # of which HTTPRoute unifi-dns's gateway-httproute source currently
      # prefers, since both candidate targets (internal.${SECRET_DOMAIN} ->
      # .22, external.${SECRET_DOMAIN} -> .23) are now complete and
      # LAN-reachable.
      external-dns.alpha.kubernetes.io/hostname: external.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "10.20.67.23"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
          - kind: Secret
            name: glycemicgpt-org-production-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: internal.${SECRET_DOMAIN}
      lbipam.cilium.io/ips: "10.20.67.22"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: ${SECRET_DOMAIN/./-}-production-tls
          - kind: Secret
            name: glycemicgpt-org-production-tls
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy
spec:
  compression:
    - type: Brotli
    - type: Gzip
  connection:
    bufferLimit: 8Mi
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  timeout:
    http:
      requestTimeout: 0s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy
spec:
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  connection:
    bufferLimit: 4Mi
    maxAcceptPerSocketEvent: 0
  # Early headers for Authentik forward auth (set before ext_authz runs)
  # These headers are required by Authentik's Envoy auth endpoint
  headers:
    earlyRequestHeaders:
      set:
        - name: X-Forwarded-Proto
          value: "https"
        - name: X-Forwarded-Host
          value: "%REQ(:AUTHORITY)%"
        - name: X-Forwarded-Uri
          value: "%REQ(:PATH)%"
        - name: X-Forwarded-Method
          value: "%REQ(:METHOD)%"
  http2:
    initialStreamWindowSize: 512Ki
    initialConnectionWindowSize: 8Mi
    onInvalidMessage: TerminateStream
  http3: {}
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
  tcpKeepalive: {}
  timeout:
    http:
      requestReceivedTimeout: 0s
  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: http
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
