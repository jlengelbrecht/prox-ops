---
# Homepage - Homelab Dashboard
# Provides a centralized dashboard for all homelab services
# Config is stored in PVC - copy existing config or configure via UI
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: tools
spec:
  chart:
    spec:
      chart: app-template
      # renovate: datasource=helm registryUrl=https://bjw-s.github.io/helm-charts
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: tools
  interval: 1h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      homepage:
        strategy: Recreate
        # Reference the ServiceAccount created in rbac.yaml for K8s service discovery
        serviceAccount:
          name: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              # renovate: datasource=docker depName=ghcr.io/gethomepage/homepage
              tag: v1.10.0
            env:
              TZ: America/New_York
              PUID: "568"
              PGID: "568"
              # homepage v1.x enforces strict Host validation (SSRF / DNS-rebind
              # protection). Without this, every external request is rejected with
              # "Host validation failed" and no config (services/bookmarks/widgets)
              # is rendered. List every host used to reach the dashboard.
              HOMEPAGE_ALLOWED_HOSTS: homepage.homelab0.org
            # Inject all HOMEPAGE_VAR_* secrets from ExternalSecret
            # These replace {{HOMEPAGE_VAR_*}} placeholders in services.yaml
            envFrom:
              - secretRef:
                  name: homepage-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      annotations:
        security.homelab/network: "Internal - Dashboard for homelab services"
        # subPath configMap mounts do not live-update; reloader restarts the pod
        # when homepage-config (or the homepage-secrets ExternalSecret) changes,
        # so Git-managed config edits actually take effect.
        reloader.stakater.com/auto: "true"

    persistence:
      # /app/config must be writable: on startup homepage copies skeleton defaults
      # (docker/kubernetes/proxmox.yaml, custom.css/js) for any config file not
      # present, and writes logs there. Back it with an emptyDir, then overlay our
      # Git-managed files (services/settings/widgets/bookmarks) read-only via subPath.
      config-rw:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/config
      config:
        enabled: true
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true

    service:
      app:
        controller: homepage
        type: ClusterIP
        ports:
          http:
            port: *port
            protocol: TCP
