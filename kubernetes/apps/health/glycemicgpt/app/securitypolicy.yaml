---
# SecurityPolicy for Authentik forward auth via Envoy ext_authz
# Attached to the main 'glycemicgpt' HTTPRoute (WebUI only)
# API routes use GlycemicGPT's own JWT authentication
# ReferenceGrant in security namespace allows cross-namespace backendRef
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: glycemicgpt-auth
  namespace: health
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: glycemicgpt
  extAuth:
    headersToExtAuth:
      - accept
      - cookie
      - authorization
      - x-forwarded-proto
      - x-forwarded-host
      - x-forwarded-for
      - x-forwarded-uri
      - x-forwarded-method
    failOpen: false
    http:
      backendRefs:
        - name: authentik-server
          namespace: security
          port: 80
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - X-authentik-username
        - X-authentik-groups
        - X-authentik-email
        - X-authentik-name
        - X-authentik-uid
