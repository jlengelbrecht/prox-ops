---
# API routes - NO Authentik forward auth (uses GlycemicGPT's own JWT auth)
# Separate HTTPRoute so SecurityPolicy (on 'glycemicgpt' route) doesn't apply
# Mobile app and WebUI JavaScript both need direct API access
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: glycemicgpt-api
  namespace: health
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "glycemicgpt.${SECRET_DOMAIN}"
  rules:
    # API endpoints - JWT authenticated by GlycemicGPT
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: glycemicgpt-api
          port: 8000
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"
              - name: X-Content-Type-Options
                value: "nosniff"
              - name: X-Frame-Options
                value: "DENY"
              - name: Referrer-Policy
                value: "no-referrer"
    # Health endpoints - no auth required
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: glycemicgpt-api
          port: 8000
