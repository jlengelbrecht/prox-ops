---
# GlycemicGPT NetworkPolicy - medical data requires strict isolation
# Per-controller policies enforce least-privilege network access
# Web: internal only | API: DB + cache + medical APIs | Sidecar: AI providers
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: glycemicgpt
  namespace: health
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: glycemicgpt

  ingress:
    # From envoy-external gateway (Cloudflare tunnel access)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            gateway.envoyproxy.io/owning-gateway-name: envoy-external
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "3000"
              protocol: TCP

    # From envoy-internal gateway (internal homelab access)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            gateway.envoyproxy.io/owning-gateway-name: envoy-internal
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "3000"
              protocol: TCP

    # Web -> API only (web frontend calls API backend)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: glycemicgpt
            app.kubernetes.io/controller: web
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP

    # API -> Sidecar only (API calls AI sidecar for inference)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: glycemicgpt
            app.kubernetes.io/controller: api
      toPorts:
        - ports:
            - port: "3456"
              protocol: TCP

  egress:
    # DNS resolution (all controllers)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

    # Web -> API only
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: glycemicgpt
            app.kubernetes.io/controller: api
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP

    # API -> Sidecar
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: glycemicgpt
            app.kubernetes.io/controller: sidecar
      toPorts:
        - ports:
            - port: "3456"
              protocol: TCP

    # API -> CNPG PostgreSQL
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: glycemicgpt-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

    # API -> Valkey cache (cache namespace)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cache
            app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP

    # API -> External medical device APIs (Dexcom, Tandem) and model downloads
    - toFQDNs:
        - matchName: share2.dexcom.com
        - matchName: shareous1.dexcom.com
        - matchName: share.dexcom.jp
        - matchName: tdcservices.tandemdiabetes.com
        - matchName: tdcservices.eu.tandemdiabetes.com
        - matchName: huggingface.co
        - matchPattern: "*.huggingface.co"
        - matchPattern: "*.hf.co"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # Sidecar -> AI provider APIs
    - toFQDNs:
        - matchName: api.anthropic.com
        - matchName: api.openai.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
