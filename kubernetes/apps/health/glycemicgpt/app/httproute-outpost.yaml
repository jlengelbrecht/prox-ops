---
# Authentik outpost route - handles login/callback flow for forward auth
# NO SecurityPolicy on this route (would create auth loop)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: glycemicgpt-outpost
  namespace: health
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "glycemicgpt.${SECRET_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io/
      backendRefs:
        - name: authentik-server
          namespace: security
          port: 80
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"
              - name: X-Frame-Options
                value: "DENY"
              - name: X-Content-Type-Options
                value: "nosniff"
