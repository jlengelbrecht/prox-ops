---
# GlycemicGPT application secrets from 1Password
# Requires 1Password item: glycemicgpt-secrets with the following fields:
#   - SECRET_KEY: JWT signing key (min 32 chars, generate with: openssl rand -hex 32)
#   - ENCRYPTION_KEY: Credential encryption key (generate with: openssl rand -hex 32)
#   - ANTHROPIC_API_KEY: Anthropic API key for Claude AI provider
#   - SIDECAR_API_KEY: Inter-service auth key for API <-> sidecar communication
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glycemicgpt-secrets
  namespace: health
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: glycemicgpt-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: glycemicgpt-secrets
        property: SECRET_KEY
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: glycemicgpt-secrets
        property: ENCRYPTION_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: glycemicgpt-secrets
        property: ANTHROPIC_API_KEY
    - secretKey: SIDECAR_API_KEY
      remoteRef:
        key: glycemicgpt-secrets
        property: SIDECAR_API_KEY
---
# Valkey password for cross-namespace cache access
# Pulls from the same 1Password item used by the Valkey deployment
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glycemicgpt-valkey
  namespace: health
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: glycemicgpt-valkey
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: valkey-secrets
        property: password
---
# CNPG superuser credentials for the GlycemicGPT PostgreSQL cluster
# Requires 1Password item: glycemicgpt-db with fields: username, password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glycemicgpt-db-superuser
  namespace: health
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: glycemicgpt-db-superuser
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: glycemicgpt-db
        property: username
    - secretKey: password
      remoteRef:
        key: glycemicgpt-db
        property: password
