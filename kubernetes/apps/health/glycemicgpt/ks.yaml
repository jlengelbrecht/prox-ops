---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: glycemicgpt
  namespace: flux-system
spec:
  dependsOn:
    - name: glycemicgpt-storage
    - name: external-secrets-operator
      namespace: flux-system
    - name: cloudnative-pg-operator
  interval: 1h
  path: ./kubernetes/apps/health/glycemicgpt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: health
  wait: false
