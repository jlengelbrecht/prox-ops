---
# PROTECTED: This PVC is in a separate Kustomization with prune: false
# to prevent accidental data loss during Flux reconciliation or cattle upgrades
# Stores fastembed model cache (~500MB) to avoid re-downloading on restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glycemicgpt-embeddings-cache
  namespace: health
  labels:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: storage
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 2Gi
---
# Backup storage for pg_dump exports
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glycemicgpt-backups
  namespace: health
  labels:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: storage
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 5Gi
